<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>식단일기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ff:-apple-system,'Helvetica Neue',sans-serif;
  --g1:rgba(255,255,255,0.52);--g2:rgba(255,255,255,0.74);--gb:rgba(255,255,255,0.78);
  --gs:0 8px 32px rgba(80,80,130,.10),0 1px 4px rgba(80,80,130,.07);
  --ct:#1C1C2E;--ct2:#52526E;--ct3:#9898B8;
  --ca:#4F7FFF;--cab:rgba(79,127,255,.11);
  --cg:#30C88A;--cr:#FF6060;--cn:#9B7CC8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}

/* ── BASE ── */
html{
  height:100%;
  /* Prevent iOS text size adjustment on rotation */
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body{
  font-family:var(--ff);
  background:#ECF0FF;
  color:var(--ct);
  min-height:100%;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  /* Prevent pull-to-refresh interfering */
  overscroll-behavior-y:contain;
}

/* ── BACKGROUND ── */
.bgm{position:fixed;inset:0;z-index:0;background:linear-gradient(145deg,#EBF1FF 0%,#F4EEFF 45%,#FFECF6 75%,#ECFFF6 100%);}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;animation:fl linear infinite;}
.o1{width:550px;height:550px;background:#C5D5FF;top:-150px;left:-100px;animation-duration:24s;}
.o2{width:440px;height:440px;background:#FFD0E8;top:25%;right:-100px;animation-duration:30s;animation-direction:reverse;}
.o3{width:400px;height:400px;background:#C8F0E4;bottom:-100px;left:15%;animation-duration:20s;}
.o4{width:320px;height:320px;background:#FFF0C0;top:50%;left:5%;animation-duration:26s;animation-direction:reverse;}
@keyframes fl{0%{transform:translate(0,0)scale(1);}33%{transform:translate(28px,-38px)scale(1.05);}66%{transform:translate(-18px,28px)scale(.96);}100%{transform:translate(0,0)scale(1);}}

.gl{background:var(--g1);backdrop-filter:blur(32px)saturate(1.7);-webkit-backdrop-filter:blur(32px)saturate(1.7);border:1px solid var(--gb);box-shadow:var(--gs);}
.gl2{background:var(--g2);backdrop-filter:blur(44px)saturate(1.9);-webkit-backdrop-filter:blur(44px)saturate(1.9);border:1px solid var(--gb);box-shadow:var(--gs);}

/* ── APP SHELL ── */
#app{
  position:relative;z-index:1;
  width:100%;
  max-width:440px;
  margin:0 auto;
  min-height:100vh;
  min-height:100dvh;
  display:flex;flex-direction:column;
  /* Honor notch on sides */
  padding-left:var(--safe-left);
  padding-right:var(--safe-right);
}
/* Desktop: card style */
@media(min-width:900px){
  body{display:flex;align-items:flex-start;justify-content:center;}
  #app{max-width:420px;box-shadow:0 24px 64px rgba(70,70,120,.14);border-radius:28px;overflow:hidden;margin:28px auto;min-height:calc(100vh - 56px);padding-left:0;padding-right:0;}
}

/* ── STATUS BAR ── */
.sbar{
  height:calc(var(--safe-top) + 44px);
  padding:calc(var(--safe-top) + 14px) 20px 0;
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-shrink:0;
}
.sbar-t{font-size:15px;font-weight:600;}

/* ── TOPBAR ── */
.topbar{
  padding:2px 20px 14px;
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-shrink:0;
}
.logo{font-size:26px;font-weight:700;letter-spacing:-1px;}
.logo em{color:var(--ca);font-style:normal;}
.tdate{font-size:12px;color:var(--ct3);font-weight:500;text-align:right;line-height:1.5;}

/* ── SCROLL CONTENT ── */
.content{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  /* bottom padding = tabbar height + safe area */
  padding:0 14px calc(90px + var(--safe-bot));
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  /* Allow content scroll but contain overscroll */
  overscroll-behavior-y:contain;
}
.content::-webkit-scrollbar{display:none;}

/* ── TAB BAR ── */
.tabbar{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:440px;
  /* Side padding respects notch, bottom respects home indicator */
  padding:8px 16px calc(var(--safe-bot) + 8px);
  z-index:100;
}
@media(min-width:900px){.tabbar{max-width:420px;}}
.tabbar-in{
  display:flex;align-items:center;justify-content:space-around;
  padding:6px 4px;border-radius:26px;
}
.tbtn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 10px;border-radius:20px;border:none;background:none;
  cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
  min-width:58px;
  /* Minimum tap target */
  min-height:44px;justify-content:center;
}
.tbtn.on{background:var(--ca);box-shadow:0 6px 22px rgba(79,127,255,.38);transform:translateY(-2px);}
.tbtn.on .ti,.tbtn.on .tl{color:#fff;}
.ti{font-size:18px;}.tl{font-size:10px;font-weight:500;color:var(--ct3);}

/* ── WRITE FAB ── */
.fab-write{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 10px;border-radius:20px;
  border:1.5px solid rgba(79,127,255,.3);
  background:rgba(79,127,255,.08);
  cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
  min-width:58px;min-height:44px;justify-content:center;
}
.fab-write:active{transform:scale(.92);}
.fab-wi{font-size:18px;}.fab-wl{font-size:10px;font-weight:600;color:var(--ca);}

/* ── VIEWS ── */
.view{display:none;animation:fu .28s ease;}.view.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.ibtn{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--ca);transition:all .18s;
  -webkit-tap-highlight-color:transparent;
  /* Minimum tap target */
  min-width:36px;
}
.ibtn:active{transform:scale(.86);}

/* ═══════════════════════════════
   CALENDAR  ── fixed layout
═══════════════════════════════ */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-m{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.cal-wrap{border-radius:22px;padding:12px 10px 16px;}

/* DOW row */
.dow-row{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:6px;
}
.dow-c{
  text-align:center;font-size:11px;font-weight:600;
  color:var(--ct3);padding:4px 0;
}
.dow-c.s{color:var(--cr);}.dow-c.sa{color:var(--ca);}

/* Cell grid */
.cgrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:3px;
}
.ccell{
  border-radius:12px;
  padding:5px 4px 6px;
  aspect-ratio:1/1.15;   /* consistent proportional height */
  min-height:0;
  cursor:pointer;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,.30);
  border:1px solid rgba(255,255,255,.55);
  overflow:hidden;
}
.ccell.emp{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.ccell:not(.emp):hover{background:rgba(255,255,255,.55);}
.ccell:not(.emp):active{transform:scale(.88);}
.ccell.tod{background:rgba(79,127,255,.13);border-color:rgba(79,127,255,.35);}
.ccell.su .dn{color:var(--cr);}.ccell.sa .dn{color:var(--ca);}

/* Day number chip */
.dn-w{
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0;
}
.ccell.tod .dn-w{background:var(--ca);}
.ccell.tod .dn{color:#fff!important;}
.dn{font-size:12px;font-weight:600;line-height:1;}

/* Emoji row */
.cc-em{font-size:10px;margin:1px 0 0;flex-shrink:0;}

/* PT badge */
.cc-pt{
  font-size:7.5px;font-weight:800;
  background:var(--cg);color:#fff;
  border-radius:4px;padding:1px 4px;
  margin:1px 0 0;flex-shrink:0;letter-spacing:.2px;
}

/* Preview lines – clamped to avoid overflow */
.cc-prev{
  font-size:8.5px;color:var(--ct2);
  line-height:1.25;text-align:center;
  overflow:hidden;
  width:100%;margin-top:2px;
  /* max 2 lines */
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  word-break:keep-all;
}

/* + add hint — vertically centered */
.cc-add{
  font-size:16px;
  color:rgba(79,127,255,.28);
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}
.ccell:hover .cc-add{color:rgba(79,127,255,.6);}

/* ═══════════════════════════════
   WEEKLY  ── drag-scroll
═══════════════════════════════ */
.wk-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.wk-ti{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.wk-ti em{color:var(--ca);font-style:normal;}
.wk-rng{font-size:12px;color:var(--ct3);font-weight:500;margin-top:3px;}

/* Drag-scroll container */
.wk-sc{
  display:flex;gap:9px;
  overflow-x:auto;
  overflow-y:visible;   /* allow today card to float up without clipping */
  padding:14px 4px 16px;  /* top padding to give room for translateY(-6px) + shadow */
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
}
.wk-sc::-webkit-scrollbar{display:none;}
.wk-sc.dragging{cursor:grabbing;}

.wdc{
  flex:0 0 clamp(96px, 28vw, 120px);
  border-radius:22px;
  padding:13px 11px;
  min-height:190px;
  cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,flex-basis .22s,min-height .22s,padding .22s;
  -webkit-tap-highlight-color:transparent;
  pointer-events:auto;
}
.wdc:active{transform:scale(.90);}
/* today: wider, taller, elevated */
.wdc.tod{
  flex:0 0 clamp(120px, 36vw, 152px);
  min-height:230px;
  padding:18px 15px;
  background:linear-gradient(145deg,rgba(79,127,255,.22),rgba(79,127,255,.10))!important;
  border-color:rgba(79,127,255,.4)!important;
  box-shadow:0 12px 36px rgba(79,127,255,.22), 0 2px 8px rgba(79,127,255,.12)!important;
  transform:translateY(-6px);
  z-index:2;
  position:relative;
}
.wdc.tod:active{transform:translateY(-6px) scale(.93);}
.wdc.tod .wdc-dw{color:var(--ca);font-size:11px;}
.wdc.tod .wdc-d{font-size:32px;color:var(--ca);}
.wdc.tod .wdc-ml{font-size:10.5px;}
/* today label chip */
.wdc-today-chip{
  display:inline-block;
  font-size:9px;font-weight:800;
  background:var(--ca);color:#fff;
  border-radius:20px;padding:2px 8px;
  margin-bottom:6px;letter-spacing:.3px;
}
.wdc-dw{font-size:10px;font-weight:700;color:var(--ct3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px;}
.wdc-d{font-size:24px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:6px;}
.wdc-em{font-size:13px;margin-bottom:3px;}
.wdc-pt{display:inline-block;font-size:9px;font-weight:700;background:var(--cg);color:#fff;border-radius:4px;padding:2px 5px;margin-bottom:3px;}
.wdc-meals{display:flex;flex-direction:column;gap:3px;}
.wdc-ml{font-size:9.5px;color:var(--ct2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wdc-mt{font-size:9px;color:var(--ca);font-weight:600;display:block;}
.wdc-emp{color:var(--ct3);font-size:20px;text-align:center;margin-top:18px;}

/* ═══════════════════════════════
   THIS WEEK
═══════════════════════════════ */
.hero{border-radius:22px;padding:22px 22px 20px;margin-bottom:18px;background:linear-gradient(135deg,rgba(79,127,255,.2) 0%,rgba(79,127,255,.07) 100%);border:1px solid rgba(79,127,255,.22);backdrop-filter:blur(32px)saturate(1.7);-webkit-backdrop-filter:blur(32px)saturate(1.7);}
.hero-tag{display:inline-flex;align-items:center;background:var(--ca);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:4px 11px;margin-bottom:12px;}
.hero-h{font-size:25px;font-weight:700;letter-spacing:-1px;line-height:1.15;margin-bottom:6px;}
.hero-s{font-size:12px;color:var(--ct2);font-weight:500;}
.hero-stats{display:flex;gap:10px;margin-top:16px;}
.hs{background:rgba(255,255,255,.52);border-radius:14px;padding:12px 14px;flex:1;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.7);aspect-ratio:1/.7;display:flex;flex-direction:column;justify-content:center;}
.hs-v{font-size:22px;font-weight:700;color:var(--ca);letter-spacing:-.8px;line-height:1;}
.hs-l{font-size:10px;color:var(--ct3);font-weight:500;margin-top:2px;}
.db{border-radius:22px;overflow:hidden;margin-bottom:11px;}
.db-hdr{display:flex;align-items:center;gap:10px;padding:15px 18px;cursor:pointer;transition:background .14s;-webkit-tap-highlight-color:transparent;}
.db-hdr:active{background:rgba(0,0,0,.03);}
.db-em{font-size:18px;}.db-inf{flex:1;}
.db-dt{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.db-sb{font-size:11px;color:var(--ct3);font-weight:500;margin-top:1px;}
.db-pt{font-size:10px;font-weight:700;background:var(--cg);color:#fff;border-radius:6px;padding:3px 8px;}
.db-ch{font-size:12px;color:var(--ct3);transition:transform .25s cubic-bezier(.34,1.3,.64,1);}
.db.cl .db-ch{transform:rotate(-90deg);}
.db-body{overflow:hidden;transition:max-height .36s cubic-bezier(.4,0,.2,1);max-height:1200px;}
.db.cl .db-body{max-height:0;}
.db-sep{height:1px;background:rgba(0,0,0,.055);margin:0 18px;}
.mlist{padding:8px 0 14px;}
.mrow{display:flex;align-items:flex-start;gap:10px;padding:8px 18px;}
.mpill{font-size:11px;font-weight:600;color:var(--ca);background:var(--cab);border-radius:6px;padding:3px 7px;flex-shrink:0;min-width:48px;text-align:center;margin-top:1px;}
.mpill.nt{color:var(--ct3);background:rgba(0,0,0,.05);}
.mpill.ng{color:var(--cn);background:rgba(155,124,200,.13);}
.mfood{font-size:13px;color:var(--ct);line-height:1.5;flex:1;}
.mfood.ng{color:var(--cn);}

/* ═══════════════════════════════
   OVERLAY / BOTTOM SHEET
═══════════════════════════════ */
.ov{position:fixed;inset:0;z-index:300;background:rgba(8,8,24,.28);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center;}
.ov.op{display:flex;}
.sh{
  width:100%;max-width:440px;
  border-radius:22px 22px 0 0;
  padding:0 0 calc(var(--safe-bot) + 28px);
  max-height:88vh;
  max-height:88dvh;
  display:flex;flex-direction:column;
  animation:shUp .36s cubic-bezier(.34,1.26,.64,1);
  overflow:hidden;
}
@media(min-width:900px){.sh{max-width:420px;}}
@keyframes shUp{from{transform:translateY(100%);opacity:.7;}to{transform:none;opacity:1;}}
.sh-hdl{width:40px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.sh-hdr{display:flex;align-items:center;gap:10px;padding:14px 20px 12px;flex-shrink:0;}
.sh-em{font-size:24px;}.sh-ti{font-size:19px;font-weight:700;letter-spacing:-.5px;flex:1;}
.sh-close{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.07);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--ct2);-webkit-tap-highlight-color:transparent;}
.sh-sep{height:1px;background:rgba(0,0,0,.07);margin:0 20px;flex-shrink:0;}
.sh-body{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;}
.sh-body::-webkit-scrollbar{display:none;}

/* edit trigger */
.edit-trig{width:calc(100% - 32px);margin:12px 16px 0;padding:11px;border-radius:14px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--ff);background:rgba(79,127,255,.1);color:var(--ca);-webkit-tap-highlight-color:transparent;transition:all .15s;}
.edit-trig:active{transform:scale(.97);}

/* edit panel */
.ep{padding:14px 18px 0;display:none;}.ep.show{display:block;}
.pt-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(48,200,138,.09);border-radius:14px;border:1px solid rgba(48,200,138,.2);margin-bottom:12px;}
.pt-lbl{font-size:13px;font-weight:600;color:var(--cg);}
.pt-tgl{display:flex;gap:6px;}
.pt-btn{padding:5px 11px;border-radius:20px;border:1.5px solid rgba(48,200,138,.3);background:none;font-size:12px;font-weight:600;cursor:pointer;color:var(--ct3);font-family:var(--ff);transition:all .15s;}
.pt-btn.on{background:var(--cg);color:#fff;border-color:var(--cg);}
.pt-tin{width:52px;border:1.5px solid rgba(48,200,138,.3);border-radius:8px;padding:4px 5px;font-size:11px;font-family:var(--ff);color:var(--ct);background:rgba(255,255,255,.7);outline:none;text-align:center;}
.pt-tin:focus{border-color:var(--cg);}
.pt-time-wrap{display:none;align-items:center;gap:3px;}
.pt-time-wrap.show{display:flex;}
.pt-time-sep{font-size:11px;color:var(--ct3);font-weight:600;}
/* 개인운동 row */
.ex-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(255,159,67,.09);border-radius:14px;border:1px solid rgba(255,159,67,.22);margin-bottom:12px;}
.ex-lbl{font-size:13px;font-weight:600;color:#FF9F43;}
.ex-btn{padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,159,67,.3);background:none;font-size:12px;font-weight:600;cursor:pointer;color:var(--ct3);font-family:var(--ff);transition:all .15s;}
.ex-btn.on{background:#FF9F43;color:#fff;border-color:#FF9F43;}
.ex-tin{width:52px;border:1.5px solid rgba(255,159,67,.3);border-radius:8px;padding:4px 5px;font-size:11px;font-family:var(--ff);color:var(--ct);background:rgba(255,255,255,.7);outline:none;text-align:center;}
.ex-tin:focus{border-color:#FF9F43;}
.ex-time-wrap{display:none;align-items:center;gap:3px;}
.ex-time-wrap.show{display:flex;}
.ex-time-sep{font-size:11px;color:var(--ct3);font-weight:600;}
/* cycle row */
.cyc-row{display:flex;align-items:center;justify-content:center;padding:11px 14px;background:rgba(255,182,193,.13);border-radius:14px;border:1px solid rgba(255,150,170,.22);margin-bottom:12px;}
.cyc-lbl{font-size:16px;line-height:1;margin-right:10px;flex-shrink:0;}
.cyc-tgl{display:flex;gap:7px;justify-content:center;}
.cyc-btn{padding:5px 13px;border-radius:20px;border:1.5px solid rgba(255,150,170,.3);background:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--ct3);font-family:var(--ff);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.cyc-btn:active{transform:scale(.92);}
.cyc-btn.on-start{background:#FF8FAB;color:#fff;border-color:#FF8FAB;box-shadow:0 4px 12px rgba(255,143,171,.35);}
.cyc-btn.on-end{background:#FFD700;color:#fff;border-color:#FFD700;box-shadow:0 4px 12px rgba(255,215,0,.35);}
.cyc-btn.on-extra{background:#C084E0;color:#fff;border-color:#C084E0;box-shadow:0 4px 12px rgba(192,132,224,.35);}
.ep-hint{font-size:11px;color:var(--ct3);line-height:1.5;padding:9px 12px;background:rgba(0,0,0,.03);border-radius:10px;margin-bottom:12px;}
.ep-hint b{color:var(--ct2);}
.erows{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.er{display:flex;gap:7px;align-items:flex-start;}
.er-left{display:flex;flex-direction:column;gap:4px;align-items:center;}
.er-time{width:64px;flex-shrink:0;border:1.5px solid rgba(79,127,255,.2);border-radius:8px;padding:8px 6px;font-size:12px;font-family:var(--ff);color:var(--ca);font-weight:600;background:rgba(255,255,255,.7);outline:none;text-align:center;}
.er-time:focus{border-color:var(--ca);background:rgba(255,255,255,.9);}
.er-nc{display:flex;align-items:center;gap:3px;}
.er-nc input{accent-color:var(--cn);width:13px;height:13px;}
.er-nc label{font-size:10px;color:var(--cn);font-weight:600;cursor:pointer;}
.er-food{flex:1;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:8px 9px;font-size:13px;font-family:var(--ff);color:var(--ct);background:rgba(255,255,255,.7);outline:none;resize:none;line-height:1.4;min-height:38px;}
.er-food:focus{border-color:rgba(79,127,255,.4);background:rgba(255,255,255,.9);}
.er-del{width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,96,96,.12);color:var(--cr);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:6px;-webkit-tap-highlight-color:transparent;transition:all .15s;}
.er-del:active{transform:scale(.85);}
.add-row{width:100%;padding:10px;border-radius:12px;border:1.5px dashed rgba(79,127,255,.3);background:rgba(79,127,255,.04);color:var(--ca);font-size:13px;font-weight:600;font-family:var(--ff);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;margin-bottom:10px;}
.add-row:active{transform:scale(.97);}
.save-btn{width:100%;padding:13px;border-radius:16px;border:none;background:var(--ca);color:#fff;font-size:15px;font-weight:700;font-family:var(--ff);cursor:pointer;box-shadow:0 6px 20px rgba(79,127,255,.32);transition:all .18s;-webkit-tap-highlight-color:transparent;margin-bottom:6px;}
.save-btn:active{transform:scale(.97);}
.del-day{width:100%;padding:11px;border-radius:14px;border:none;background:rgba(255,96,96,.08);color:var(--cr);font-size:13px;font-weight:600;font-family:var(--ff);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;margin-bottom:4px;}
.del-day:active{transform:scale(.97);}

/* toast */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 96px);left:50%;transform:translateX(-50%) translateY(16px);background:rgba(28,28,46,.88);color:#fff;font-size:13px;font-weight:600;border-radius:20px;padding:10px 20px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);white-space:nowrap;}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SMALL SCREEN (≤375px, e.g. iPhone SE) ── */
@media(max-width:375px){
  .ccell{height:64px;min-height:64px;padding:4px 2px 4px;}
  .dn{font-size:11px;}
  .cc-pt{font-size:7px;padding:1px 3px;}
  .cc-prev{font-size:7.5px;}
  .logo{font-size:22px;}
  .sbar,.topbar{padding-left:14px;padding-right:14px;}
  .content{padding-left:10px;padding-right:10px;}
  .hero-h{font-size:21px;}
  .tbtn,.fab-write{padding:6px 8px;min-width:50px;}
  .ti,.fab-wi{font-size:16px;}
  .tl,.fab-wl{font-size:9px;}
}

/* backup sheet */
.bk-section{padding:18px 20px 0;}
.bk-title{font-size:13px;font-weight:700;color:var(--ct2);margin-bottom:10px;letter-spacing:.2px;}
.bk-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;border-radius:16px;border:none;cursor:pointer;font-family:var(--ff);transition:all .16s;-webkit-tap-highlight-color:transparent;margin-bottom:10px;text-align:left;}
.bk-btn:active{transform:scale(.97);}
.bk-btn.export{background:rgba(79,127,255,.1);color:var(--ca);}
.bk-btn.import{background:rgba(48,200,138,.1);color:var(--cg);}
.bk-btn.copy{background:rgba(155,124,200,.1);color:var(--cn);}
.bk-btn.reset{background:rgba(255,96,96,.08);color:var(--cr);}
.bk-ico{font-size:22px;flex-shrink:0;}
.bk-txt{}
.bk-txt b{display:block;font-size:14px;font-weight:700;}
.bk-txt span{display:block;font-size:11px;opacity:.7;margin-top:1px;}

.bk-stat-row .lbl{color:var(--ct3);font-size:12px;}
.bk-stat-row .val{font-weight:700;color:var(--ct);}
.bk-warn{font-size:11px;color:var(--cr);background:rgba(255,96,96,.07);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5;}
/* guide box */
.bk-guide{border-radius:16px;background:linear-gradient(135deg,rgba(79,127,255,.08),rgba(79,127,255,.04));border:1px solid rgba(79,127,255,.18);padding:16px;margin-bottom:18px;}
.bk-guide-title{font-size:13px;font-weight:700;color:var(--ca);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.bk-guide-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.bk-guide-item:last-child{margin-bottom:0;}
.bk-guide-num{width:20px;height:20px;border-radius:50%;background:var(--ca);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.bk-guide-txt{font-size:12px;color:var(--ct2);line-height:1.55;}
.bk-guide-txt b{color:var(--ct);font-weight:700;}
.bk-guide-txt em{color:var(--ca);font-style:normal;font-weight:600;}
.bk-guide-sep{height:1px;background:rgba(79,127,255,.12);margin:10px 0;}

// ─── UTILS ────────────────────────────────────────
var DK=["일","월","화","수","목","금","토"];
var DE={월:"❤️",화:"🧡",수:"💛",목:"💚",금:"💙",토:"💜",일:"🩷"};
function p2(n){return("0"+n).slice(-2);}
function mk(y,m,d){return y+"-"+p2(m)+"-"+p2(d);}
function getToday(){var d=new Date();return mk(d.getFullYear(),d.getMonth()+1,d.getDate());}
function dowi(k){var p=k.split("-");return new Date(+p[0],+p[1]-1,+p[2]).getDay();}
function dowkr(k){return DK[dowi(k)];}
function dowem(k){return DE[dowkr(k)]||"🩷";}
function wkn(k){var p=k.split("-"),y=+p[0],m=+p[1],d=+p[2];var fd=new Date(y,m-1,1).getDay()||7;return Math.floor((d-(1-(fd-1))-1)/7)+1;}
function maxwk(y,m){return wkn(mk(y,m,new Date(y,m,0).getDate()));}
function wkdates(y,m,w){var fd=new Date(y,m-1,1).getDay()||7,ws=1-(fd-1)+(w-1)*7,arr=[];for(var i=0;i<7;i++){var dt=new Date(y,m-1,ws+i);arr.push(mk(dt.getFullYear(),dt.getMonth()+1,dt.getDate()));}return arr;}
function curwk(){var t=TODAY,p=t.split("-");return{y:+p[0],m:+p[1],w:wkn(t)};}
function fmtr(ds){
  // ds[0] = "2026-03-16", ds[6] = "2026-03-22"
  var s=ds[0].split("-"), e=ds[6].split("-");
  return (+s[1])+"/"+( +s[2])+" — "+(+e[1])+"/"+(+e[2]);
}
function fmttime(raw){var s=raw.trim();if(!s)return"";if(/^\d{3,4}$/.test(s)){var x=("0"+s).slice(-4);return x.slice(0,2)+":"+x.slice(2);}return s;}

  var fd=new Date(calY,calM-1,1).getDay();
  var ld=new Date(calY,calM,0).getDate();

  // empty leading cells
  for(var i=0;i<fd;i++){var e=document.createElement("div");e.className="ccell emp";g.appendChild(e);}

  for(var d=1;d<=ld;d++){
    var k=mk(calY,calM,d);

    var el=document.createElement("div");

    el.className=cls;

    // day number
    var inner='<div class="dn-w"><div class="dn">'+d+"</div></div>";

    if(data){
      // emoji + cycle indicator
      var cyc=cycEmoji(k);
      inner+='<div class="cc-em">'+dowem(k)+(cyc?' <span style="font-size:9px;">'+cyc+'</span>':'')+"</div>";
      // PT badge
      if(data.pt) inner+='<div class="cc-pt">PT '+data.pt+"</div>";
      if(data.ex) inner+='<div class="cc-pt" style="background:#FF9F43;">💪 '+data.ex+"</div>";
      // preview: first 1-2 non-night rows, show time + food (short)
      var rows=data.r.filter(function(r){return !r.n;});
      if(rows.length>0){
        var lines="";
        for(var i2=0;i2<Math.min(2,rows.length);i2++){
          var r=rows[i2];
          var txt=(r.t?(r.t+" "):"")+(r.f||"").replace(/☕️|🌙/g,"").trim().substring(0,8);
          lines+=txt+(i2<Math.min(2,rows.length)-1?"<br>":"");
        }
        inner+='<div class="cc-prev">'+lines+"</div>";
      }
    } else {
      inner+='<div class="cc-add">＋</div>';
    }

    el.innerHTML=inner;
    el.onclick=(function(kk){return function(){openSheet(kk);};})(k);
    g.appendChild(el);
  }
}
function chMon(d){calM+=d;if(calM>12){calM=1;calY++;}if(calM<1){calM=12;calY--;}renderCal();}

function renderWeekly(){
  var _ws=ws;
  document.getElementById("wkTi").innerHTML=_ws.m+"월 <em>"+_ws.w+"주차</em>";
  var dates=wkdates(_ws.y,_ws.m,_ws.w);

  var sc=document.getElementById("wkSc"); sc.innerHTML="";

  var lbls=["월","화","수","목","금","토","일"];
  var todayCardEl=null;
  for(var i=0;i<7;i++){
    var k=dates[i];
    var pp=k.split("-"); var dd=+pp[2];
    var data=DB[k];
    var isToday=(k===TODAY);
    var card=document.createElement("div");
    card.className="wdc gl"+(isToday?" tod":"");
    var h='<div class="wdc-dw">'+lbls[i]+'</div>';
    if(isToday) h+='<div class="wdc-today-chip">오늘</div>';
    h+='<div class="wdc-d">'+dd+"</div>";
    if(data){
      var cyc2=cycEmoji(k);
      h+='<div class="wdc-em">'+dowem(k)+(cyc2?" "+cyc2:"")+"</div>";
      if(data.pt) h+='<div class="wdc-pt">PT '+data.pt+"</div>";
      if(data.ex) h+='<div class="wdc-pt" style="background:#FF9F43;">💪 '+data.ex+"</div>";
      h+='<div class="wdc-meals">';
      var rows=data.r.filter(function(r){return !r.n;});
      for(var j=0;j<Math.min(4,rows.length);j++){
        var r=rows[j];
        var txt=(r.f||"").replace(/☕️|🌙/g,"").trim().substring(0,14);
        h+='<div class="wdc-ml"><span class="wdc-mt">'+(r.t||"")+"</span>"+txt+"</div>";
      }
      h+="</div>";
    } else {
      h+='<div class="wdc-emp">—</div>';
    }
    card.innerHTML=h;
    card.onclick=(function(kk){return function(){openSheet(kk);};})(k);
    sc.appendChild(card);
    if(isToday) todayCardEl=card;
  }

  // ── auto-scroll today card to center ──────────────
  if(todayCardEl){
    // use requestAnimationFrame so layout is complete
    requestAnimationFrame(function(){
      var scW=sc.offsetWidth;
      var cardL=todayCardEl.offsetLeft;
      var cardW=todayCardEl.offsetWidth;
      sc.scrollLeft = cardL - (scW/2) + (cardW/2);
    });
  }

  // ── drag-to-scroll ──────────────────────────────
  initDragScroll(sc);
}

function initDragScroll(el){
  var isDown=false, startX=0, scrollLeft=0, moved=false;
  el.addEventListener("mousedown",function(e){
    isDown=true; moved=false;
    el.classList.add("dragging");
    startX=e.pageX - el.getBoundingClientRect().left;
    scrollLeft=el.scrollLeft;
    e.preventDefault();
  });
  document.addEventListener("mouseup",function(){
    isDown=false; el.classList.remove("dragging");
  });
  document.addEventListener("mousemove",function(e){
    if(!isDown) return;
    moved=true;
    var x=e.pageX - el.getBoundingClientRect().left;
    var walk=(x - startX)*1.5;
    el.scrollLeft=scrollLeft-walk;
  });
  // prevent click after drag
  el.addEventListener("click",function(e){
    if(moved){e.stopPropagation();}
  },true);
}

function shareApp(){
  try {
    // Inject current DB into a copy of this page's HTML and make a data: URL
    var html = document.documentElement.outerHTML;
    // Replace SEED definition with current DB so shared version has latest data
    var dbJson = JSON.stringify(DB);
    html = html.replace(
      /var SEED\s*=\s*\{\};[\s\S]*?\/\/ ─── STORAGE/,
      'var SEED = ' + dbJson + ';\n\n// ─── STORAGE'
    );
    // Also pre-fill localStorage key so it loads immediately on open
    var injectScript = '<script>try{localStorage.setItem("sikdan_v3",JSON.stringify(' + dbJson + '));}catch(e){}<\/script>';
    html = html.replace('</head>', injectScript + '</head>');

    var blob = new Blob([html], {type: 'text/html'});
    var url = URL.createObjectURL(blob);

    // Copy the blob URL — works in same session; also offer download fallback
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){
        showShareResult(url);
      }).catch(function(){ showShareResult(url); });
    } else {
      showShareResult(url);
    }
  } catch(e) {
    toast("❌ 공유 링크 생성 실패");
  }
}

      if(typeof parsed!=="object"||Array.isArray(parsed)) throw new Error("invalid");

      renderCal();

        var remoteKeys = Object.keys(remote).length;
        var localKeys = Object.keys(DB).length;
        if(remoteKeys >= localKeys){
          DB = remote;
          try{localStorage.setItem(SK, JSON.stringify(DB));}catch(e){}
          // 현재 열린 뷰 새로고침
          var v = document.querySelector(".view.on");
          if(v){
            if(v.id==="view-calendar") renderCal();
            else if(v.id==="view-weekly") renderWeekly();
            else renderTW();
          }
        }
        showSyncStatus("☁️");
      }catch(e){ showSyncStatus("❌"); }
    } else {
      // 첫 연결: 현재 데이터 업로드
      window.fbSave();
      showSyncStatus("☁️");
    }
  }, function(err){
    console.warn("Firebase 연결 실패", err);
    showSyncStatus("📵");
  });
};

function showSyncStatus(icon){
  var el = document.getElementById("syncStatus");
  if(el){ el.textContent = icon; el.title = icon==="☁️"?"동기화 완료":icon==="⏳"?"동기화 중...":"오프라인 모드"; }
}
</script>
</body>
</html>
